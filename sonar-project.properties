# SonarQube configuration for rlottie.
#
# NOTE: set sonar.projectKey to the key of your SonarQube project (or pass it on
# the scanner command line / from CI) — the rest of this file only narrows the
# analysis scope.

sonar.projectKey=rlottie
sonar.projectName=rlottie
sonar.projectVersion=0.2

sonar.sources=src,inc
sonar.tests=test

# Vendored third-party code. These are imported upstream releases, updated
# wholesale (see "updated to latest rapidjson" in the history), so local edits
# would be lost on the next sync and only make that sync harder to review.
# Report their issues upstream instead of patching them here.
#
#   src/lottie/rapidjson  RapidJSON (MIT, Tencent/Milo Yip)
#   src/lottie/zip        miniz + zip (public domain / MIT)
#   src/vector/freetype   FreeType-derived rasterizer (FTL/GPLv2)
#   src/vector/pixman     pixman-derived region code (MIT)
#   src/vector/stb        stb_image (public domain / MIT)
sonar.exclusions=\
  src/lottie/rapidjson/**,\
  src/lottie/zip/**,\
  src/vector/freetype/**,\
  src/vector/pixman/**,\
  src/vector/stb/**

# Same set, excluded from duplication and coverage reporting.
sonar.cpd.exclusions=${sonar.exclusions}
sonar.coverage.exclusions=${sonar.exclusions}

sonar.sourceEncoding=UTF-8
